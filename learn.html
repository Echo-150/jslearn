                        </template>
                        <template #edit="{ row }">

                    </vxe-column>
                    <vxe-column field="tobeSuffix" title="şó×ş" header-align="center" align="center" width="120" :edit-render="{ autofocus: true }">

                        </template>

                        </template>
                    </vxe-column>
                    <!--
						<vxe-column field="shipNumber" title="´¬şĹ" width="150" header-align="center" align="left" :edit-render="{autofocus: true}">
							<template #edit="scope">
								<vxe-select v-model="scope.row.shipNumber" :options="shipNumberList" clearable></vxe-select>

						-->
                    <vxe-column field="createPeopleId" title="˛Ů×÷ČËÔ±Ö°şĹ" width="120" header-align="center" align="left" :visible="false"></vxe-column>
                    <vxe-column field="createPeople" title="˛Ů×÷ČËÔ±" width="100" header-align="center" align="left" :visible="false"></vxe-column>

<script>
    import axios from 'axios';
    import VxeUI from 'vxe-pc-ui';
    import cacheStorage from '@/shared/utils/storage';
    import { getUuid, getCurrentTime, messageVxeUI, isBlankStr, eosSearch, formatDate, getFormData } from '@/shared/utils/common';
    import { getUserInfo } from '@/shared/utils/eosJsp';
    import { findIndexFast, getIntersectionAndDifference } from '@/shared/utils/ArrayRes';
    import { loadShipNumber } from '@/pages/qms/reNdt/js/reNdt';
    export default {
        name: 'qms-reNdt-dataBase-codeRule',
        data() {
            return {
                // ˛»żÉ¸Ä¶Ż
                rowId: 'id',
                tableRef: 'xTable',
                // ±ŘĐë×Ö¶Î
                tableName: 'DSIC_RE_NDT_CODE_RULE',
                entityName: 'com.dsic.qms.reNdt.resource.DsicReNdtCodeRule',
                originalForm: {},
                pageSizeList: [10, 20, 50, 100, 200],
                // ×Ô¶¨Ňĺ
                formData: { shipNumber: [], detectionClass: '' },
                tableData: [],
                loading: false,
                pageNum: 1,
                pageSize: 50,
                total: 0,
                validRules: {
                    detectionClass: [{ required: true, message: '±ŘĚîĎî!' }],
                    ruleCode: [{ required: true, message: '±ŘĚîĎî!' }]
                },
                gridShipConfig: { checkboxConfig: { trigger: 'row' } },
                columnShipList: [{ field: 'label', title: '´¬şĹ' }],
                shipNumberList: [],
                customConfig: {
                    enabled: true,
                    immediate: true,
                    storage: { visible: true, resizable: true, sort: true, fixed: true },
                    updateStore(option) {
                        cacheStorage.setItem(option.id, option.storeData || {});
                    },
                    async restoreStore(option) {
                        return await cacheStorage.getItem(option.id, option.storeData);
                    }
                },
                editConfig: { trigger: 'click', mode: 'row', showStatus: true, enabled: false },
                checkboxConfig: { trigger: 'row', highlight: true, reserve: true },
                userInfo: {},
                currentTimeWeak: ''
            };
        },
        async created() {
            loadShipNumber(this);
            this.userInfo = await getUserInfo();
            this.editConfig.beforeEditMethod = (option) => {
                const row = option.row;
                const createPeopleId = row.createPeopleId;
                if (row.lockStatus === 1) return false;
                return isBlankStr(createPeopleId) || createPeopleId === this.userInfo.userCode;
            };
            this.checkboxConfig.checkMethod = (option) => {
                const row = option.row;
                const createPeopleId = row.createPeopleId;
                if (row.lockStatus === 1) return row.lockPeople === this.userInfo.userName;
                return isBlankStr(createPeopleId) || createPeopleId === this.userInfo.userCode;
            };
            this.currentTimeWeak = await getCurrentTime();
        },
        mounted() {
            this.originalForm = deepClone(this.formData);
            this.conditionSearch();
            this.$nextTick(() => {
                this.$refs[this.tableRef].connect(this.$refs.xToolbar);
            });
        },
        computed: {
            shipNumberTypes() {
                return this.formData.shipNumber === null || this.formData.shipNumber.length === 0 ? '' : this.formData.shipNumber.join(',');
            }
        },
        methods: {
            lockEdit() {
                const enabled = this.editConfig.enabled;
                this.editConfig.enabled = !enabled;
                if (enabled) this.search();
            },
            async lock(value) {
                const xTable = this.$refs[this.tableRef];
                const selectRow = xTable.getCheckboxRecords();
                if (selectRow.length <= 0) return messageVxeUI({ status: 'error', content: 'ÖÁÉŮŃˇÖĐŇ»ĚőĽÇÂĽŁˇ' });
                const rowIds = [];
                for (const item of selectRow) {
                    if (item.lockPeople && item.lockPeople !== this.userInfo.userName) return messageVxeUI({ status: 'error', content: '´ćÔÚËř¶¨ČËÔ±·Çµ±Ç°˛Ů×÷ČËÔ±µÄĽÇÂĽŁˇ' });
                    rowIds.push(item.id);
                }
                const { data: text } = await axios.post('commonController.commonBiz.lockData.biz.ext', {
                    lockStatus: value,
                    lockPeople: this.userInfo.userName,
                    rowIds,
                    datebaseName: this.tableName
                });
                if (text.exception != null) return messageVxeUI({ status: 'error', content: text.exception });
                this.search();
            },
            add() {
                const newRow = { id: getUuid() };
                this.$refs[this.tableRef].insert(newRow);
            },
            copy() {
                const xTable = this.$refs[this.tableRef];
                const selectRows = xTable.getCheckboxRecords();
                if (selectRows.length === 0) return messageVxeUI({ status: 'error', content: 'ÖÁÉŮŃˇÔńŇ»ĚőĘýľÝŁˇ' });
                const copyRows = deepClone(selectRows);
                copyRows.forEach((item) => (item.id = getUuid()));
                copyRows.forEach((row) => xTable.insert(row));
            },
            async save() {
                if (this.loading) return;
                this.loading = true;
                const xTable = this.$refs[this.tableRef];
                const valid = await xTable.validate();
                if (valid) {
                    this.loading = false;
                    return messageVxeUI({ status: 'error', content: 'ÇëĽě˛éÎĘĚâĘýľÝŁˇ' });
                }
                const date = this.currentTimeWeak.replace('T', ' ');
                let insertRow = xTable.getInsertRecords();
                let updateRow = xTable.getUpdateRecords();
                if (insertRow.length === 0 && updateRow.length === 0) {
                    this.loading = false;
                    return messageVxeUI({ status: 'warning', content: 'ĘýľÝÎ´·˘Éú¸ü¸ÄŁ¬ÎŢĐč±Ł´ćŁˇ' });
                }
                const arrOption = [];
                if (insertRow.length !== 0) {
                    insertRow = insertRow.map((item) => ({
                        ...deepClone(item),
                        createPeopleId: this.userInfo.userCode,
                        createPeople: this.userInfo.userName,
                        createTime: date
                    }));
                    arrOption.push({ rows: insertRow, url: 'com.dsic.qms.reNdt.dsicrendtcoderulebiz.addDsicReNdtCodeRules.biz.ext' });
                }
                if (updateRow.length !== 0) {
                    updateRow = updateRow.map((item) => ({
                        ...deepClone(item),
                        createPeopleId: this.userInfo.userCode,
                        createPeople: this.userInfo.userName,
                        createTime: date
                    }));
                    arrOption.push({ rows: updateRow, url: 'com.dsic.qms.reNdt.dsicrendtcoderulebiz.updateDsicReNdtCodeRules.biz.ext' });
                }
                try {
                    const results = await Promise.all(arrOption.map((item) => axios.post(item.url, { dsicrendtcoderules: item.rows })));
                    const hasError = results.some((res) => res.data.exception != null);
                    if (!hasError) {
                        messageVxeUI({ status: 'success', content: '±Ł´ćłÉą¦Łˇ' });
                        this.search();
                    } else messageVxeUI({ status: 'error', content: '±Ł´ćĘ§°ÜŁˇ' });
                } finally {
                    this.loading = false;
                }
            },
            async remove() {
                const xTable = this.$refs[this.tableRef];
                const selectRow = xTable.getCheckboxRecords();
                if (selectRow.length === 0) return messageVxeUI({ status: 'error', content: 'ÖÁÉŮŃˇÔńŇ»ĚőĘýľÝŁˇ' });
                const tableData = xTable.getTableData().tableData;
                const uids = tableData.map((row) => row[this.rowId]);
                // ŇŃËř¶¨ĐŁŃé
                const lockRow = selectRow.filter((item) => Number(item.lockStatus) === 1);
                if (lockRow.length > 0) {
                    const indexs = lockRow.map((item) => {
                        const uid = item[this.rowId];
                        return Number(findIndexFast(uids, uid)) + 1;
                    });
                    return messageVxeUI({ status: 'error', content: `µÚ${indexs.join('ˇ˘')}ĐĐĽÇÂĽ,´ćÔÚŇŃËř¶¨µÄĘýľÝ,˛»żÉÉľłýŁˇ` });
                }
                // ˛Ů×÷ČËĐŁŃé
                const otherOperators = selectRow.filter((item) => !isBlankStr(item.createPeopleId) && item.createPeopleId !== this.userInfo.userCode);
                if (otherOperators.length > 0) {
                    const indexs = otherOperators.map((item) => {
                        const uid = item[this.rowId];
                        return Number(findIndexFast(uids, uid)) + 1;
                    });
                    return messageVxeUI({ status: 'error', content: `µÚ${indexs.join('ˇ˘')}ĐĐĽÇÂĽ,˛Ů×÷ČËÔ±·Çµ±Ç°ÓĂ»§,˝űÖąÉľłý!` });
                }
                const insertRow = xTable.getInsertRecords();
                const calculateData = getIntersectionAndDifference(selectRow, insertRow, this.rowId);
                if (calculateData.difference.length === 0) {
                    xTable.remove(selectRow);
                    return;
                }
                const action = await VxeUI.modal.confirm('Č·¶¨ÉľłýŃˇÖĐĽÇÂĽŁż', 'ĎµÍłĚáĘľ');
                if (action !== 'confirm') return;
                const actualDeletions = selectRow.filter((item) => !isBlankStr(item.id));
                const { data: text } = await axios.post('com.dsic.qms.reNdt.dsicrendtcoderulebiz.deleteDsicReNdtCodeRules.biz.ext', { dsicrendtcoderules: actualDeletions });
                if (text.exception == null) {
                    messageVxeUI({ status: 'success', content: 'ÉľłýłÉą¦Łˇ' });
                    xTable.remove(selectRow);
                } else messageVxeUI({ status: 'error', content: 'ÉľłýĘ§°ÜŁˇ' });
            },
            async search() {
                await this.$nextTick();
                this.loading = true;
                try {
                    const res = await eosSearch(getFormData(), this.pageNum, this.pageSize, 'com.dsic.qms.reNdt.dsicrendtcoderulebiz.queryDsicReNdtCodeRules.biz.ext');
                    this.tableData = res.dsicrendtcoderules || [];
                    this.total = res.total;
                } finally {
                    this.loading = false;
                }
            },
            reset() {
                this.formData = deepClone(this.originalForm);
                this.search();
            },
            clearData() {
                this.tableData = [];
                this.pageNum = 1;
                this.pageSize = 50;
                this.total = 0;
            },
            conditionSearch() {
                this.clearData();
                this.search();
            },
            pageChange({ pageSize, currentPage }) {
                this.pageNum = currentPage;
                this.pageSize = pageSize;
                this.search();
            },
            formatDate
        }
    };
</script>
