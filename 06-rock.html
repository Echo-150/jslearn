<!DOCTYPE html>
<html>



<head>
    <title>rock,paper,scissors</title>
    <style>
              /* 统一按钮样式 */
        .button-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: space-around;
            width: 100%;
            max-width: 600px;
        }

        button {
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
      
        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            flex: 1;
            min-width: 120px;
            text-align: center;
        }
        
        .btn:hover {
            background-color: #2980b9;
            }
    </style>


</head>

<body>
    <p>
        Rock,Paper,Scissors
    </p>
    <button title="rock" class="btn" onclick="
       play('rock');
    ">rock</button>

    <button title="paper" class="btn" onclick="
        play('paper');
    ">paper</button>

    <button title="scissors" class="btn" onclick="
       play('scissors');
    ">scissors</button>

    <button title="reset" class="btn" onclick="
       score.wins=0;
       score.losses=0;
       score.ties=0;
       alert(`Current Score:win: ${score.wins}-lose: ${score.losses}-tie: ${score.ties}`);
      
    ">reset</button>



    <script>
        const score={
            wins: 0,
            losses: 0,
            ties:0
            }

        const savedScore = localStorage.getItem('score');
        if (savedScore) {
            const parsedScore = JSON.parse(savedScore);
            score.wins = parsedScore.wins;
            score.losses = parsedScore.losses;
            score.ties = parsedScore.ties;
        }

        function play(userMove) {
            const num = Math.random();
            let move;
            if (num >= 0 && num < 1 / 3) {
                move = 'rock';
            }
            else if (num >= 1 / 3 && num < 2 / 3) {
                move = 'paper';
            }
            else if (num >= 2 / 3 && num < 1) {
                move = 'scissors';
            }
            console.log(`computer move : ${move}`);
            let ans;
        
            
            switch (move+userMove) {
                case 'rockrock':
                    ans = 'tie.';
                    score.ties++;
                    break;
                case 'paperpaper':
                    ans = 'tie.';
                    score.ties++;
                    break;
                case 'scissorsscissors':
                    ans = 'tie.';
                    score.ties++;
                    break;
                case 'rockpaper':
                    ans = 'You win!';
                    score.wins++;
                    break;
                case 'paperrock':
                    ans = 'You lose!';
                    score.losses++;
                    break;
                case 'rockscissors':
                    ans = 'You lose!';
                    score.losses++;
                    break;
                case 'scissorsrock':
                    ans = 'You win!';
                    score.wins++;
                    break;
                case 'paperscissors':
                    ans = 'You win!';
                    score.wins++;
                    break;
                case 'scissorspaper':
                    ans = 'You lose!';
                    score.losses++;
                    break;
            }

            localStorage.setItem('score', JSON.stringify(score));

            alert(`You picked ${userMove},Computer picked ${move},${ans}\nCurrent Score:win: ${score.wins}-lose: ${score.losses}-tie: ${score.ties}`);
        }


       
    </script>
</body>

</html>
