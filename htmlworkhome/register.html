<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 学生信息管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .register-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }
        
        .role-selection {
            margin-bottom: 20px;
        }
        
        .role-selection h3 {
            margin-bottom: 10px;
            color: #555;
            font-size: 16px;
        }
        
        .role-options {
            display: flex;
            gap: 20px;
        }
        
        .role-option {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
        }
        
        .form-group .error {
            color: #f44336;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        
        .form-group.error input {
            border-color: #f44336;
        }
        
        .form-group.error .error {
            display: block;
        }
        
        .register-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }
        
        .register-btn:active {
            transform: translateY(0);
        }
        
        .bottom-links {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
        }
        
        .bottom-links a {
            color: #f5576c;
            text-decoration: none;
            margin: 0 10px;
            transition: color 0.3s ease;
        }
        
        .bottom-links a:hover {
            color: #f093fb;
            text-decoration: underline;
        }
        
        /* 成功提示弹窗 */
        .success-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease;
        }
        
        .success-content {
            background-color: white;
            margin: 15% auto;
            padding: 30px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s ease;
        }
        
        .success-content h2 {
            color: #4CAF50;
            margin-bottom: 20px;
        }
        
        .success-content p {
            color: #555;
            margin-bottom: 30px;
        }
        
        .success-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .success-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }
        
        /* 动画效果 */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .register-container {
                padding: 30px;
                margin: 20px;
            }
            
            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h1>学生信息管理系统</h1>
        
        <div class="role-selection">
            <h3>角色选择</h3>
            <div class="role-options">
                <div class="role-option">
                    <input type="radio" id="admin" name="role" value="admin" checked>
                    <label for="admin">管理员</label>
                </div>
                <div class="role-option">
                    <input type="radio" id="user" name="role" value="user">
                    <label for="user">普通用户</label>
                </div>
            </div>
        </div>
        
        <form id="registerForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名">
                <div class="error">请输入用户名</div>
            </div>
            
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码">
                <div class="error">密码长度至少6位</div>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">确认密码</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="请再次输入密码">
                <div class="error">两次密码输入不一致</div>
            </div>
            
            <button type="button" class="register-btn" onclick="register()">注册</button>
        </form>
        
        <div class="bottom-links">
            <a href="login.html">已有账号？立即登录</a>
            <a href="#">返回首页</a>
        </div>
    </div>
    
    <!-- 注册成功提示弹窗 -->
    <div id="successModal" class="success-modal">
        <div class="success-content">
            <h2>注册成功！</h2>
            <p>您的账号已成功创建，即将跳转到登录页面...</p>
            <button class="success-btn" onclick="goToLogin()">确定</button>
        </div>
    </div>
    
    <script src="./js/auth.js"></script>
    <script>
        // 表单验证
        function validateForm() {
            let isValid = true;
            
            // 验证用户名
            const username = document.getElementById('username');
            if (!username.value.trim()) {
                username.parentElement.classList.add('error');
                isValid = false;
            } else {
                username.parentElement.classList.remove('error');
            }
            
            // 验证密码
            const password = document.getElementById('password');
            if (password.value.length < 6) {
                password.parentElement.classList.add('error');
                isValid = false;
            } else {
                password.parentElement.classList.remove('error');
            }
            
            // 验证确认密码
            const confirmPassword = document.getElementById('confirmPassword');
            if (confirmPassword.value !== password.value) {
                confirmPassword.parentElement.classList.add('error');
                isValid = false;
            } else {
                confirmPassword.parentElement.classList.remove('error');
            }
            
            return isValid;
        }
        
        // 注册函数
        function register() {
            if (validateForm()) {
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                const role = document.querySelector('input[name="role"]:checked').value;
                
                const result = Auth.register(username, password, role);
                
                if (result.success) {
                    // 显示成功提示
                    const successModal = document.getElementById('successModal');
                    successModal.style.display = 'block';
                    
                    // 3秒后自动跳转到登录页面
                    setTimeout(Auth.redirectToLogin, 3000);
                } else {
                    // 注册失败，显示错误提示
                    alert(result.message);
                }
            }
        }
        
        // 跳转到登录页面
        function goToLogin() {
            Auth.redirectToLogin();
        }
        
        // 点击模态框外部关闭
        window.onclick = function(event) {
            const successModal = document.getElementById('successModal');
            if (event.target == successModal) {
                successModal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
