<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>网页打开摄像头</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#f5f5f5;padding:40px;text-align:center}

.container{width:600px;margin:0 auto}
video{
    width:100%;
    height:auto;
    border:8px solid #333;
    border-radius:12px;
    background:#000;
}
.btn{
    margin-top:20px;
    padding:12px 24px;
    font-size:16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
.open{background:#22c55e;color:#fff}
.close{background:#ef4444;color:#fff;margin-left:10px}
</style>
</head>
<body>
<div class="container">
    <h2>网页实时摄像头</h2>
    <!-- 摄像头画面显示框 -->
    <video id="cameraView" autoplay playsinline></video>

    <button class="btn open" onclick="openCamera()">开启摄像头</button>
    <button class="btn close" onclick="closeCamera()">关闭摄像头</button>
</div>

<script>
let mediaStream = null;
const video = document.getElementById('cameraView');

// 开启摄像头
async function openCamera(){
    try{
        // 请求摄像头权限
        mediaStream = await navigator.mediaDevices.getUserMedia({
            video:true,
            audio:false
        });
        // 把摄像头画面放到video标签里显示
        video.srcObject = mediaStream;
    }catch(err){
        alert('无法打开摄像头：'+err.message);
    }
}

// 关闭摄像头
function closeCamera(){
    if(mediaStream){
        mediaStream.getTracks().forEach(track=>track.stop());
        video.srcObject = null;
        mediaStream = null;
    }
}
</script>
</body>
</html>
