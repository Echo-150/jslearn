<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>HTML5表单</title>
</head>
<body>
    <!-- HTML5 表单 -->
    <form action="" method="get">
        
        <!-- email邮箱输入框，自带格式校验 -->
        <div>
            <label>邮箱：</label>
            <input type="email" name="userEmail" required placeholder="请输入邮箱">
        </div>

        <br>

        <!-- 日期选择器 -->
        <div>
            <label>选择日期：</label>
            <input type="date" name="selectDate">
        </div>

        <br>

        <!-- 颜色选择器 -->
        <div>
            <label>选择颜色：</label>
            <input type="color" name="selectColor">
        </div>

        <br>

        <!-- 提交按钮 -->
        <div>
            <input type="submit" value="提交">
        </div>

    </form>
</body>
</html>
